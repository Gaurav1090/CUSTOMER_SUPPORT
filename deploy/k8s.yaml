apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-support-rag # This is the 'DEPLOYMENT_NAME' in the CI/CD workflow
  labels:
    app: customer-support-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-support-rag
  template:
    metadata:
      labels:
        app: customer-support-rag
      annotations:
        # This annotation links the Kubernetes Service Account to the Google Service Account
        iam.gke.io/gcp-service-account: customer-support-rag-sa@${GCP_PROJECT_ID}.iam.gserviceaccount.com # <-- Replace with your GSA email
    spec:
      # This KSA will be linked to a GSA by Workload Identity
      serviceAccountName: customer-support-rag-ksa
      containers:
        - name: app
          image: customer-support-rag:latest # This will be replaced by the CI/CD pipeline
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: APP_API_KEY
              valueFrom: { secretKeyRef: { name: gcp-secrets-file, key: app-api-key } }
            - name: GROQ_API_KEY
              valueFrom: { secretKeyRef: { name: gcp-secrets-file, key: groq-api-key } }
            - name: REDIS_HOST # Assuming you will use Memorystore
              valueFrom: { secretKeyRef: { name: gcp-secrets-file, key: redis-host } }
            - name: CHROMA_API_KEY
              valueFrom: { secretKeyRef: { name: gcp-secrets-file, key: chroma-api-key } }
            - name: CHROMA_TENANT
              valueFrom: { secretKeyRef: { name: gcp-secrets-file, key: chroma-tenant } }
            - name: CHROMA_DATABASE
              valueFrom: { secretKeyRef: { name: gcp-secrets-file, key: chroma-database } }
            - name: ALLOWED_ORIGINS
              value: "https://yourdomain.com"
            # Use Chroma Cloud for persistence across multiple replicas
            - name: CHROMA_STORAGE_MODE
              value: "cloud"
          # The application code must be updated to read secrets from these file paths
          # e.g., APP_API_KEY_FILE=/var/secrets/gcp/app-api-key
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: customer-support-rag
spec:
  type: ClusterIP
  selector:
    app: customer-support-rag
  ports:
    - port: 80
      targetPort: 8001
---
# A Kubernetes Service Account for your application pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: customer-support-rag-ksa # Must match serviceAccountName in Deployment
  namespace: default
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customer-support-rag
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-support-rag
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# This resource tells the Secrets Store CSI driver how to fetch secrets
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gcp-secrets-provider
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/${GCP_PROJECT_ID}/secrets/app-api-key/versions/latest"
        fileName: "app-api-key"
      - resourceName: "projects/${GCP_PROJECT_ID}/secrets/groq-api-key/versions/latest"
        fileName: "groq-api-key"
      - resourceName: "projects/${GCP_PROJECT_ID}/secrets/redis-host/versions/latest"
        fileName: "redis-host"
      - resourceName: "projects/${GCP_PROJECT_ID}/secrets/chroma-api-key/versions/latest"
        fileName: "chroma-api-key"
      - resourceName: "projects/${GCP_PROJECT_ID}/secrets/chroma-tenant/versions/latest"
        fileName: "chroma-tenant"
      - resourceName: "projects/${GCP_PROJECT_ID}/secrets/chroma-database/versions/latest"
        fileName: "chroma-database"
  # This (optional) block creates a native Kubernetes secret from the fetched secrets,
  # allowing the 'valueFrom' syntax to work as you originally intended.
  secretObjects:
  - secretName: gcp-secrets-file
    type: Opaque
    data:
    - key: app-api-key
      objectName: app-api-key
    - key: groq-api-key
      objectName: groq-api-key
    - key: redis-host
      objectName: redis-host
    - key: chroma-api-key
      objectName: chroma-api-key
    - key: chroma-tenant
      objectName: chroma-tenant
    - key: chroma-database
      objectName: chroma-database
