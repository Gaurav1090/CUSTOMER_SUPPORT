name: RAG Evaluation CI

on:
  push:
    branches: [main, develop, feature-*]
  pull_request:
    branches: [main, develop]

jobs:
  evaluation:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # redis + fakeredis: only needed to exercise the Redis-backed
          # cache/rate-limiter/session-store code paths in tests -- not a
          # full requirements-optional.txt install (that also pulls in
          # ragas/langfuse/cloud-storage backends this job doesn't need).
          pip install redis fakeredis

      - name: Run all tests and generate evaluation report
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: |
          # Run all unit tests from the 'tests' directory (every test_*.py
          # file -- this used to be scoped to "test_phase*.py" only, which
          # silently skipped test_chroma_utils.py, test_retrieval_logic.py,
          # test_query_rewriter.py, and test_redis_backed.py in CI).
          python -m unittest discover tests -p "test_*.py" -v

          # Generate the full evaluation report for artifacts. Fails the
          # build (non-zero exit) if mean_score regresses beyond tolerance
          # against evaluation/baseline_results.json.
          python -m evaluation.run_evaluation
      
      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results-py${{ matrix.python-version }}
          path: evaluation/results.json
