name: _reusable-tests

on:
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # redis + fakeredis: only needed to exercise the Redis-backed
          # cache/rate-limiter/session-store code paths in tests -- not a
          # full requirements-optional.txt install (that also pulls in
          # ragas/langfuse/cloud-storage backends this job doesn't need).
          pip install redis fakeredis

      - name: Run fast unit test suite (no live provider calls, no quota use)
        run: python -m unittest discover tests -p "test_*.py" -v
